<!DOCTYPE html>
<html>
<head>
    <title>Pet-Link Bracelet Interface</title>
    <style>
        /* Layout: Robot on top, Clock below */
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        
        #robot-container { height: 150px; margin-bottom: 20px; }
        #hand-video, #tail-video { display: none; width: 100px; margin: 0 auto; }
        #head { font-size: 50px; }

        /* Clock/Bracelet CSS */
        #clock { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 2px solid black; margin: 0 auto; }
        .number, .led { position: absolute; transform: translate(-50%, -50%); }
        .led { width: 12px; height: 12px; border-radius: 50%; background: #ccc; }
        .hand { position: absolute; width: 2px; background-color: black; transform-origin: bottom center; }
        .center { position: absolute; width: 10px; height: 10px; background-color: black; border-radius: 50%; top: 145px; left: 145px; }
    </style>
</head>
<body>

    <div id="robot-container">
        <div id="head">O</div>
        <video id="hand-video" muted playsinline>
            <source src="video_1776962312152.mp4" type="video/mp4">
        </video>
        <video id="tail-video" muted playsinline>
            <source src="video_1776962329199~2.mp4" type="video/mp4">
        </video>
    </div>

    <div id="clock">
        <div id="hourHand" class="hand"></div>
        <div id="minuteHand" class="hand"></div>
        <div id="secondHand" class="hand"></div>
        <div class="center"></div>
    </div>

    <input type="text" id="messageInput" placeholder="Enter message">
    <button onclick="displayMessage()">Send</button>
    <button onclick="deleteMessage()">Delete</button>

    <script>
        const clock = document.getElementById('clock');
        const messageInput = document.getElementById('messageInput');

        // Initialize LEDs
        for (let i = 1; i <= 12; i++) {
            const angle = (i - 3) * (Math.PI / 6);
            const led = document.createElement('div');
            led.className = 'led';
            led.id = 'led' + i;
            led.style.left = 150 + Math.cos(angle) * 130 + 'px';
            led.style.top = 150 + Math.sin(angle) * 130 + 'px';
            clock.appendChild(led);
        }

        // The Controller that handles Video + Lights
        function triggerVideo(id) {
            const vid = document.getElementById(id);
            vid.style.display = 'block';
            vid.currentTime = 0;
            vid.play();
            setTimeout(() => { vid.style.display = 'none'; vid.pause(); }, 2000);
        }

        function displayCharacter(char) {
            let color, ledIndex;
            // ... (Your original mapping logic here) ...
            if (char >= 'A' && char <= 'L') { color = 'red'; ledIndex = char.charCodeAt(0) - 64; }
            else if (char >= 'M' && char <= 'X') { color = 'blue'; ledIndex = char.charCodeAt(0) - 76; }
            else if (char >= 'Y' || (char >= '0' && char <= '9')) { color = 'green'; ledIndex = 12; }

            const led = document.getElementById('led' + ledIndex);
            if (led) {
                led.style.backgroundColor = color;
                triggerVideo('hand-video'); // Play typing animation
                setTimeout(() => led.style.backgroundColor = '#ccc', 1000);
            }
        }

        function displayMessage() {
            const msg = messageInput.value.toUpperCase();
            for (let i = 0; i < msg.length; i++) {
                setTimeout(() => displayCharacter(msg[i]), i * 1500);
            }
        }

        function deleteMessage() {
            triggerVideo('tail-video'); // Play eating animation
            alert("Message Eaten!");
        }
    </script>
</body>
</html>
