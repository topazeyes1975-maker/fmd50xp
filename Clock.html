<!DOCTYPE html>
<html>
<head>
    <title>Pet-Link Bracelet</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        
        /* The Robot Area */
        #robot-container { height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #head { font-size: 50px; }
        #hand-video, #tail-video { display: none; width: 120px; border: 2px solid #333; border-radius: 10px; }

        /* The Bracelet Clock */
        #clock { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 4px solid #333; margin: 30px auto; background: white; }
        .led { width: 14px; height: 14px; border-radius: 50%; background: #ccc; position: absolute; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="robot-container">
        <div id="head">🐶</div>
        <video id="hand-video" muted playsinline>
            <source src="video_1776962312152.mp4" type="video/mp4">
        </video>
        <video id="tail-video" muted playsinline>
            <source src="video_1776962329199~2.mp4" type="video/mp4">
        </video>
    </div>

    <div id="clock"></div>

    <input type="text" id="msg" placeholder="Type message...">
    <button onclick="startFullProcess()">SEND</button>
    <button onclick="deleteProcess()">DELETE</button>

    <script>
        const clock = document.getElementById('clock');
        
        // Initialize 12 LEDs
        for (let i = 1; i <= 12; i++) {
            const angle = (i - 3) * (Math.PI / 6);
            const led = document.createElement('div');
            led.className = 'led';
            led.id = 'led' + i;
            led.style.left = 150 + Math.cos(angle) * 130 + 'px';
            led.style.top = 150 + Math.sin(angle) * 130 + 'px';
            clock.appendChild(led);
        }

        // Logic: Mapping characters to lights
        function getLedData(char) {
            if (char >= 'A' && char <= 'L') return { color: 'red', index: char.charCodeAt(0) - 64 };
            if (char >= 'M' && char <= 'X') return { color: 'blue', index: char.charCodeAt(0) - 76 };
            return { color: 'green', index: 12 };
        }

        // Action Trigger
        function playVideo(id) {
            const vid = document.getElementById(id);
            vid.style.display = 'block';
            vid.currentTime = 0;
            vid.play();
            setTimeout(() => { vid.style.display = 'none'; vid.pause(); }, 3000);
        }

        // The Async Sequence: Lights first, Video second
        async function startFullProcess() {
            const text = document.getElementById('msg').value.toUpperCase();
            
            for (let char of text) {
                const data = getLedData(char);
                const led = document.getElementById('led' + data.index);
                
                led.style.backgroundColor = data.color;
                await new Promise(r => setTimeout(r, 1000)); // Wait 1s
                led.style.backgroundColor = '#ccc';
            }
            
            // Once the loop is done, play the hand video
            playVideo('hand-video');
        }

        function deleteProcess() {
            // Clear lights and play tail video
            document.querySelectorAll('.led').forEach(l => l.style.backgroundColor = '#ccc');
            playVideo('tail-video');
        }
    </script>
</body>
</html>
